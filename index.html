<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Social Links</title>
    <meta name="description" content="Connect with me on social media. Links to my Instagram, Snapchat, Quora, X, Discord, Reddit, Pinterest, and GitHub.">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Inter:wght@400;500;700&family=Roboto:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Swiper's CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
    
    <!-- Custom CSS applied from admin -->
    <style id="custom-css-block"></style>
</head>
<body>
    <!-- Background Canvas/Layer -->
    <div id="animated-bg" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; pointer-events:none;"></div>

    
    <main class="container">
        <header class="profile-section">
            <div class="avatar-wrapper">
                <img src="https://ui-avatars.com/api/?name=User&background=random&size=150" alt="Profile Picture" id="profile-img">
            </div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px; position: relative;">
                <h1 id="profile-name">@adityagotlost</h1>
                <div id="status-badge" class="status-badge" style="display: none;">
                    <span class="status-dot"></span>
                    <span id="status-text" class="status-text"></span>
                </div>
                <button id="qr-btn" class="qr-btn" title="Show QR Code"><i class="fa-solid fa-qrcode"></i></button>
            </div>
            <p id="profile-bio"></p>
            <div class="typing-container">
                <span id="typing-tagline" class="typing-tagline"></span>
                <span class="typing-cursor">|</span>
            </div>
            <div id="skills-container" class="skills-container"></div>
            
            <!-- vCard Save Button -->
            <a href="/api/vcard" id="vcard-btn" class="vcard-btn" style="display:none;">
                <i class="fa-solid fa-address-card"></i> Save to Contacts
            </a>
        </header>

        <button id="theme-toggle" class="theme-toggle" title="Toggle Light/Dark Mode">
            <i class="fa-solid fa-moon"></i>
        </button>

        <!-- Tip Jar Widget -->
        <div id="tip-jar-container" style="display: none; text-align: center; margin-bottom: 20px;">
            <a id="tip-jar-link" href="#" target="_blank" class="tip-jar-btn">
                <i class="fa-solid fa-mug-hot"></i> <span id="tip-jar-text">Buy me a coffee</span>
            </a>
        </div>

        <!-- Gallery Slider -->
        <div id="gallery-container" style="display:none; margin-bottom: 20px;">
            <div class="swiper gallery-slider" style="border-radius:14px; overflow:hidden;">
                <div class="swiper-wrapper" id="gallery-wrapper">
                    <!-- Slides will be injected here -->
                </div>
                <!-- Add Pagination -->
                <div class="swiper-pagination"></div>
            </div>
        </div>

        <div id="links-container" class="links-section">
            <!-- Links will be loaded here dynamically from the backend -->
            <div style="text-align: center; color: white;">Loading links...</div>
        </div>

        <!-- Social Icons Footer -->
        <footer id="social-footer" class="social-footer"></footer>

        <!-- Spotify Now Playing Widget -->
        <div id="spotify-widget" style="display:none;" class="spotify-widget">
            <a id="spotify-link" href="#" target="_blank">
                <img id="spotify-art" src="" alt="Album Art" />
                <div class="spotify-info">
                    <div class="spotify-label"><i class="fa-brands fa-spotify"></i> Now Playing</div>
                    <div id="spotify-track" class="spotify-track"></div>
                    <div id="spotify-artist" class="spotify-artist"></div>
                    <div class="spotify-bar"><div id="spotify-progress" class="spotify-progress"></div></div>
                </div>
            </a>
        </div>


        <section class="contact-section">
            <h2>Contact Me</h2>
            <form id="contact-form" class="contact-form">
                <div class="form-group">
                    <input type="text" id="contact-name" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" id="contact-email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea id="contact-message" name="message" placeholder="Your Message" rows="4" required></textarea>
                </div>
                <button type="submit" class="submit-btn" id="contact-submit">
                    <span class="btn-text">Send Message</span>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
                <div id="contact-response" class="response-message"></div>
            </form>
        </section>

        <!-- Newsletter Section -->
        <section id="newsletter-section" class="contact-section" style="display: none; margin-top: 30px;">
            <h2 id="newsletter-title">Subscribe to my Newsletter</h2>
            <form id="newsletter-form" class="contact-form">
                <div class="form-group" style="display: flex; gap: 10px;">
                    <input type="email" id="newsletter-email" placeholder="Your Email Address" required style="flex: 1;">
                    <button type="submit" class="submit-btn" id="newsletter-submit" style="width: auto; padding: 0.8rem 1.5rem;">
                        <span class="btn-text">Subscribe</span>
                    </button>
                </div>
                <div id="newsletter-response" class="response-message"></div>
            </form>
        </section>

        <!-- Visitor Counter -->
        <div id="visitor-counter" class="visitor-counter"></div>
    </main>

    <!-- QR Code Modal -->
    <div id="qr-modal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width: 300px; text-align: center;">
            <span class="close" id="qr-close">&times;</span>
            <h2>Scan to Connect</h2>
            <div id="qrcode" style="margin: 20px auto; display: flex; justify-content: center;"></div>
        </div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
    
    <!-- Custom JS injected dynamically -->
    <script id="custom-js-block"></script>
</body>
</html>
